<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교육과정 핵심테마 출제포인트 인출시험</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1225;
    --card: #1a1f3a;
    --card2: #20264a;
    --border: #2e3560;
    --accent: #f5a623;
    --accent2: #e8921a;
    --green: #4caf82;
    --red: #e05555;
    --blue: #5b8dee;
    --text: #e8ecf5;
    --muted: #8892b0;
    --tag: #2d3561;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h1 {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
  }
  .progress-bar-wrap {
    margin-top: 12px;
    background: var(--bg);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .sidebar-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0 16px;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .toc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .toc-item:hover { background: var(--card2); }
  .toc-item.active {
    background: var(--card2);
    border-left-color: var(--accent);
  }
  .toc-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    min-width: 22px;
    font-variant-numeric: tabular-nums;
  }
  .toc-title {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .toc-gauge {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
  }
  .toc-gauge svg { width: 32px; height: 32px; }
  .gauge-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .gauge-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .gauge-text { font-size: 8px; font-weight: 700; fill: var(--text); dominant-baseline: central; text-anchor: middle; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 860px;
  }
  .main-header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .q-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--tag);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .q-title {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 8px;
  }
  .q-points {
    font-size: 13px;
    color: var(--muted);
  }
  .q-points span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ── TEXTAREA ── */
  .answer-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 28px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0f1225;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--blue);
    border: 1.5px solid var(--blue);
  }
  .btn-ghost:hover { background: var(--blue); color: white; }

  /* ── RESULT PANEL ── */
  .result-panel {
    margin-top: 24px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    display: none;
  }
  .result-panel.visible { display: block; }
  .result-score-bar {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .result-score-bar.pass { background: rgba(76,175,130,0.15); border-bottom: 1px solid rgba(76,175,130,0.3); }
  .result-score-bar.partial { background: rgba(245,166,35,0.12); border-bottom: 1px solid rgba(245,166,35,0.3); }
  .result-score-bar.fail { background: rgba(224,85,85,0.12); border-bottom: 1px solid rgba(224,85,85,0.3); }
  .score-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
    flex-shrink: 0;
  }
  .score-circle.pass { background: rgba(76,175,130,0.2); color: var(--green); }
  .score-circle.partial { background: rgba(245,166,35,0.2); color: var(--accent); }
  .score-circle.fail { background: rgba(224,85,85,0.2); color: var(--red); }
  .score-info h3 { font-size: 15px; font-weight: 700; }
  .score-info p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .keyword-section { padding: 16px 20px; background: var(--card); }
  .keyword-section h4 { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .chip.hit { background: rgba(76,175,130,0.2); color: var(--green); border: 1px solid rgba(76,175,130,0.4); }
  .chip.miss { background: rgba(224,85,85,0.15); color: #e08888; border: 1px solid rgba(224,85,85,0.3); }

  .answer-section {
    padding: 16px 20px;
    background: var(--card2);
    border-top: 1px solid var(--border);
  }
  .answer-section h4 { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .answer-text {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-wrap;
  }
  .answer-text strong { color: var(--accent); }

  /* ── NAVIGATION ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 6px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-pos { font-size: 13px; color: var(--muted); }

  /* ── WELCOME ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 16px;
  }
  .welcome-icon { font-size: 56px; }
  .welcome h2 { font-size: 26px; font-weight: 900; }
  .welcome p { color: var(--muted); font-size: 15px; max-width: 400px; line-height: 1.7; }
  .welcome .stats {
    display: flex; gap: 24px; margin-top: 8px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 22px;
    text-align: center;
  }
  .stat-box .num { font-size: 28px; font-weight: 900; color: var(--accent); }
  .stat-box .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; height: auto; position: static; max-height: 260px; }
    .main { padding: 24px 20px; max-width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📚 교육과정 인출시험</h1>
      <p>2024학년도 설보연 SANTA 교육학</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="globalBar"></div>
      </div>
      <div class="progress-label">
        <span id="globalLabel">0 / 29 완료</span>
        <span id="globalPct">0%</span>
      </div>
    </div>
    <div class="sidebar-list" id="tocList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="welcome">
      <div class="welcome-icon">🎯</div>
      <h2>핵심테마 인출시험</h2>
      <p>왼쪽 목차에서 문제를 선택하거나 아래 버튼으로 시작하세요.<br>키워드 매칭으로 자동 채점됩니다.</p>
      <div class="welcome .stats">
        <div class="stat-box"><div class="num">29</div><div class="lbl">총 문제</div></div>
        <div class="stat-box"><div class="num" id="welcomeDone">0</div><div class="lbl">완료</div></div>
        <div class="stat-box"><div class="num" id="welcomeAvg">-</div><div class="lbl">평균점수</div></div>
      </div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="goToQ(0)">▶ 1번부터 시작</button>
    </div>
  </main>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const questions = [
  {
    id: 1,
    title: "잠재적 교육과정 & 숨겨진 교육과정",
    short: "잠재적·숨겨진 교육과정",
    points: 8,
    question: "잠재적 교육과정의 개념과 원천 3가지, 숨겨진(hidden) 교육과정의 개념, 이를 극복하기 위한 방안 3가지를 서술하시오.",
    keywords: ["잠재적 교육과정","의도하지 않","은연중","군집성","상찬","권력","숨겨진","hidden","극복","정의적","문화 다원론","탈목표","발달적"],
    answer: `【잠재적 교육과정】
학교에서 계획하거나 의도하지 않았음에도 불구하고 학교생활을 통해 경험한 교육과정. 학교생활 중 은연중에 가지게 되는 경험의 총체.

【원천 - Jackson (군상권)】
① 군집성(crowds): 다양한 계층 학생들이 어울림을 통해 배움
② 상찬(praise): 교사와 학생들의 평가 및 그에 따른 보상과 처벌
③ 권력(power): 학교 조직을 통해 권위관계 및 권위에의 순종 학습

【숨겨진(hidden) 교육과정】
교육과정을 결정하는 권력자나 집단이 의도하였거나 관행에 의해 계획하였으며, 교사가 이에 동조하거나 의도나 관행을 간파하지 못하여 학생들의 지식, 태도, 행동에 영향을 미치게 된 학교의 교육 실천 및 환경과 그 결과

【극복 방안】
① 인지적 교육목표뿐만 아니라 정의적, 인성적 교육목표의 설정 필요
② 문화 다원론적 관점에서 교육내용을 선정하고 조직할 것
③ 탈목표(goal-free)평가, 성취평가제, 발달적 평가관의 적용 필요`
  },
  {
    id: 2,
    title: "영 교육과정",
    short: "영 교육과정",
    points: 7,
    question: "영 교육과정의 개념, 조건 3가지, 발생원인 3가지를 서술하시오.",
    keywords: ["영 교육과정","null","배제","조건","교육목표에 부합","가치가 있","기회를 갖지 못","발생원인","정치적","타성","방어적","단순화","신비화","생략","단편화"],
    answer: `【영 교육과정】
꼭 필요한 교육내용이지만 학교에서 배제된 교육과정. '실제로 존재하지 않는(null, 0) 교육과정'

【조건 3가지】
① 학교가 설정한 교육목표에 부합함
② 학습자에게 가르칠 만한 가치가 있음
③ 학교가 가르치지 않아 학습자가 배울 기회를 갖지 못함

【발생원인】
① 정치적, 사회적 요인
② 교육과정 개발자의 타성: 편견, 경직된 제도 및 신념
③ 교사의 타성 및 의욕 부족
  → 교사의 방어적 수업(McNeil): 단순화·신비화·생략·방어적 단편화`
  },
  {
    id: 3,
    title: "교과중심 교육과정",
    short: "교과중심 교육과정",
    points: 8,
    question: "형식도야론의 개념과 형식도야를 강조하는 교육과정 관점의 명칭, 이 교육과정의 특징 2가지, 장점 2가지, 단점 2가지를 서술하시오.",
    keywords: ["형식도야","능력심리학","교과중심","문화유산","설명식","강의식","반복","암기","일반적 전이","안정감","학습자의 요구","수동적","창의성"],
    answer: `【형식도야론】
운동을 통해 근육을 단련하듯 전통교과를 통해 마음의 능력 훈련 또는 도야가 가능하다고 여기는 이론(능력심리학)

→ '교과중심 교육과정': 전통적 문화유산과 학문적 성취 중 가장 항존적, 본질적인 것을 선정하여 다음 세대에 전달하는 교육과정

【특징】
① 교육내용: 전통적으로 가르쳐오던 교과와 학문
② 교육방법: 교사의 일방적, 직접적 교수 → 설명식, 강의식 / 반복, 암기, 훈련
③ 교육효과: 일반적 전이를 가정함

【장점】
① 체계적인 지식 및 문화유산의 효율적 전달 용이
② 사전 계획이 뚜렷하여 교사·학생에게 안정감 제공

【단점】
① 학습자의 요구와 흥미 무시
② 학습자의 수동적 학습태도 / 창의성·문제해결력 함양 어려움`
  },
  {
    id: 4,
    title: "교육과정 조직 유형 (분과·상관·광역·융합)",
    short: "분과·상관·광역·융합형",
    points: 10,
    question: "분과형 교육과정, 상관형 교육과정의 각각의 개념, 광역형 교육과정과 융합형 교육과정의 개념 및 장단점 각각 1가지, 융합형 교육과정의 실행조건 2가지를 서술하시오.",
    keywords: ["분과형","상관형","광역형","융합형","독립","정체성","통합사회","블록","모듈","창의","기초교육","실행조건","융통성"],
    answer: `【분과형】
한 교과를 다른 교과와 완전히 독립하여 각각 조직한 교육과정. 각 학문의 기본적 논리·구조·핵심 개념 및 원리 중심의 설계.

【상관형】
각 교과의 정체성은 유지하면서 서로 관련짓는 설계 방법 (ex. 역사+문학작품)

【광역형】 (ex. 통합사회, 통합과학)
넓은 영역에서 사실이나 개념 또는 원리를 중심으로 조직하는 교육과정
- 장점: 학문의 개별적 성격이 유지되면서 교과목 통합을 촉진

// ── STATE ──
const state = {
  scores: new Array(questions.length).fill(null), // null=미시도, 0~100
  current: -1
};

// ── GAUGE SVG ──
function buildGauge(idx) {
  const score = state.scores[idx];
  const r = 13, cx = 16, cy = 16;
  const circ = 2 * Math.PI * r;
  let dashOffset, strokeColor;
  if (score === null) {
    dashOffset = circ;
    strokeColor = '#4caf82';
  } else {
    dashOffset = circ * (1 - score / 100);
    strokeColor = score >= 70 ? '#4caf82' : score >= 40 ? '#f5a623' : '#e05555';
  }
  const label = score === null ? '–' : score + '%';
  return `<svg viewBox="0 0 32 32">
    <circle class="gauge-bg" cx="${cx}" cy="${cy}" r="${r}" stroke-dasharray="${circ}" />
    <circle class="gauge-fill" cx="${cx}" cy="${cy}" r="${r}"
      stroke="${strokeColor}"
      stroke-dasharray="${circ}"
      stroke-dashoffset="${dashOffset}"
      transform="rotate(-90 ${cx} ${cy})" />
    <text class="gauge-text" x="${cx}" y="${cy}">${label}</text>
  </svg>`;
}

// ── TOC ──
function renderTOC() {
  const list = document.getElementById('tocList');
  list.innerHTML = questions.map((q, i) => `
    <div class="toc-item ${state.current === i ? 'active' : ''}" onclick="goToQ(${i})" id="toc-${i}">
      <span class="toc-num">${String(q.id).padStart(2,'0')}</span>
      <span class="toc-title">${q.short}</span>
      <span class="toc-gauge">${buildGauge(i)}</span>
    </div>
  `).join('');
  updateGlobalBar();
}

function updateTOCItem(idx) {
  const item = document.getElementById(`toc-${idx}`);
  if (!item) return;
  item.querySelector('.toc-gauge').innerHTML = buildGauge(idx);
}

function updateGlobalBar() {
  const done = state.scores.filter(s => s !== null).length;
  const avg = done > 0 ? Math.round(state.scores.filter(s=>s!==null).reduce((a,b)=>a+b,0)/done) : 0;
  const pct = Math.round(done / questions.length * 100);
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalLabel').textContent = `${done} / ${questions.length} 완료`;
  document.getElementById('globalPct').textContent = pct + '%';
  const wDone = document.getElementById('welcomeDone');
  const wAvg = document.getElementById('welcomeAvg');
  if (wDone) wDone.textContent = done;
  if (wAvg) wAvg.textContent = done > 0 ? avg + '%' : '-';
}

// ── NAVIGATE ──
function goToQ(idx) {
  state.current = idx;
  renderTOC();
  renderQuestion(idx);
  // Scroll sidebar to active
  const el = document.getElementById(`toc-${idx}`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── RENDER QUESTION ──
function renderQuestion(idx) {
  const q = questions[idx];
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="main-header">
      <div class="q-badge">문제 ${q.id} / 29</div>
      <div class="q-title">${q.title}</div>
      <div class="q-points">배점: <span>${q.points}점</span></div>
    </div>

    <p style="font-size:15px;line-height:1.8;color:var(--text)">${q.question}</p>

    <div class="answer-label">📝 나의 답안</div>
    <textarea id="answerInput" placeholder="여기에 답을 작성하세요...">${''}</textarea>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkAnswer(${idx})">✔ 채점하기</button>
      <button class="btn btn-secondary" onclick="showAnswer(${idx})">📖 정답 보기</button>
      <button class="btn btn-secondary" onclick="resetQ(${idx})">↺ 초기화</button>
    </div>

    <div class="result-panel" id="resultPanel"></div>

    <div class="nav-row">
      <button class="nav-btn" onclick="goToQ(${idx-1})" ${idx===0?'disabled':''}>
        ← 이전
      </button>
      <span class="nav-pos">${idx+1} / ${questions.length}</span>
      <button class="nav-btn" onclick="goToQ(${idx+1})" ${idx===questions.length-1?'disabled':''}>
        다음 →
      </button>
    </div>
  `;
}

// ── SCORING ──
function checkAnswer(idx) {
  const q = questions[idx];
  const input = document.getElementById('answerInput').value.trim();
  if (!input) { alert('답안을 먼저 작성해주세요!'); return; }

  const hit = [], miss = [];
  q.keywords.forEach(kw => {
    if (input.includes(kw)) hit.push(kw);
    else miss.push(kw);
  });

  const score = Math.round((hit.length / q.keywords.length) * 100);
  state.scores[idx] = score;
  updateTOCItem(idx);
  updateGlobalBar();

  const level = score >= 70 ? 'pass' : score >= 40 ? 'partial' : 'fail';
  const emoji = score >= 70 ? '🎉' : score >= 40 ? '📌' : '📚';
  const msg = score >= 70 ? '핵심 키워드를 잘 포함했습니다!' : score >= 40 ? '일부 키워드가 누락되었습니다. 해설을 확인하세요.' : '핵심 키워드가 많이 누락되었습니다. 해설을 꼭 확인하세요!';

  const panel = document.getElementById('resultPanel');
  panel.className = 'result-panel visible';
  panel.innerHTML = `
    <div class="result-score-bar ${level}">
      <div class="score-circle ${level}">${score}%</div>
      <div class="score-info">
        <h3>${emoji} ${msg}</h3>
        <p>키워드 ${hit.length} / ${q.keywords.length} 포함됨</p>
      </div>
    </div>
    <div class="keyword-section">
      <h4>키워드 분석</h4>
      <div class="keyword-chips">
        ${hit.map(k=>`<span class="chip hit">✓ ${k}</span>`).join('')}
        ${miss.map(k=>`<span class="chip miss">✗ ${k}</span>`).join('')}
      </div>
    </div>
    <div class="answer-section">
      <h4>모범 답안</h4>
      <div class="answer-text">${formatAnswer(q.answer)}</div>
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showAnswer(idx) {
  const q = questions[idx];
  const panel = document.getElementById('resultPanel');
  panel.className = 'result-panel visible';
  panel.innerHTML = `
    <div class="answer-section" style="border-top:none">
      <h4>📖 모범 답안</h4>
      <div class="answer-text">${formatAnswer(q.answer)}</div>
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetQ(idx) {
  state.scores[idx] = null;
  updateTOCItem(idx);
  updateGlobalBar();
  renderQuestion(idx);
}

function formatAnswer(text) {
  return text
    .replace(/【(.+?)】/g, '<strong style="color:var(--accent)">【$1】</strong>')
    .replace(/\n/g, '<br>');
}

// ── INIT ──
renderTOC();
</script>
</body>
</html>
